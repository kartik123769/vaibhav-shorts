name: Render Remotion Video

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    env:
      NODE_OPTIONS: --max-old-space-size=4096

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Remotion
        run: npx remotion build

      - name: Render video
        run: npx remotion render VaibhavShortsFullVideo out/video.mp4

      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: video
          path: out/video.mp4
