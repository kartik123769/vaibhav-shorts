name: Render Remotion Video

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      # IMPORTANT: ensure chrome exists for Remotion
      - name: Install Remotion browser
        run: npx remotion browser ensure

      # Render video (SAFE ENTRY POINT AUTO-DETECT)
      - name: Render video
        run: npx remotion render src/Root.tsx VaibhavShortsFullVideo out/video.mp4 --log=verbose

      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: video
          path: out/video.mp4
