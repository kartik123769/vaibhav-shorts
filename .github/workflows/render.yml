name: Render Remotion Video

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    env:
      REMOTION_CHROME_FLAGS: --no-sandbox
      NODE_OPTIONS: --max-old-space-size=4096

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Chrome deps
        run: |
          npx remotion browser ensure

      - name: Render video
        run: mkdir -p out && npx remotion render src/index.ts VaibhavShortsFullVideo out/video.mp4 --log=verbose 2>&1 | tee render.log

      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: video
          path: out/video.mp4
